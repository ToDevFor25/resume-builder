<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signing in — StretchRole</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --white:#fff;--off:#F9F9F8;--ink:#111;--muted:#525252;--light:#8a8a8a;--lighter:#c4c4c4;
  --border:#E5E5E5;--accent:#1B4FD8;--accent-light:#EEF2FF;
  --green:#16A34A;--green-bg:#F0FDF4;--green-border:#BBF7D0;
  --red:#DC2626;--red-bg:#FEF2F2;
  --radius:10px;--radius-sm:7px;--radius-lg:14px;
}
html,body{
  font-family:'DM Sans',sans-serif;background:var(--off);color:var(--ink);
  -webkit-font-smoothing:antialiased;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:2.5rem;
  text-align:center;width:100%;max-width:360px;
  box-shadow:0 12px 40px rgba(0,0,0,.08);
}
.logo{display:flex;align-items:center;justify-content:center;gap:.5rem;text-decoration:none;margin-bottom:2rem;}
.logo-mark{width:32px;height:32px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:16px;height:16px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.logo-text{font-family:'Instrument Serif',serif;font-size:1.1rem;color:var(--ink);}
.spinner{width:36px;height:36px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.status-title{font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--ink);margin-bottom:.4rem;}
.status-sub{font-size:.82rem;color:var(--light);font-weight:300;line-height:1.6;}
.success-icon{width:44px;height:44px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.success-icon svg{width:20px;height:20px;stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.error-icon{width:44px;height:44px;background:var(--red-bg);border:1px solid #FECACA;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.error-icon svg{width:20px;height:20px;stroke:var(--red);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.retry-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.55rem 1.1rem;border-radius:var(--radius-sm);font-size:.82rem;font-weight:500;color:white;background:var(--accent);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:1rem;text-decoration:none;transition:background .13s;}
.retry-btn:hover{background:#1540b8;}
.debug-note{margin-top:1.25rem;font-size:.68rem;color:var(--lighter);line-height:1.5;}
#state-loading{display:block;}
#state-success,#state-error{display:none;}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 16 16"><path d="M2 12L8 4L14 12" stroke-linejoin="round"/><path d="M5 12L8 8L11 12"/></svg></div>
    <span class="logo-text">StretchRole</span>
  </a>

  <div id="state-loading">
    <div class="spinner"></div>
    <div class="status-title">Signing you in…</div>
    <div class="status-sub">Setting up your account. You'll be redirected momentarily.</div>
  </div>

  <div id="state-success">
    <div class="success-icon"><svg viewBox="0 0 20 20"><path d="M4 10l4 4 8-8"/></svg></div>
    <div class="status-title">You're in.</div>
    <div class="status-sub">Redirecting to your workspace…</div>
    <div class="debug-note" id="debug-note"></div>
  </div>

  <div id="state-error">
    <div class="error-icon"><svg viewBox="0 0 20 20"><path d="M10 6v4M10 14v.01"/><circle cx="10" cy="10" r="8"/></svg></div>
    <div class="status-title">Sign-in failed</div>
    <div class="status-sub" id="error-msg">Something went wrong. Please try again.</div>
    <a href="/login" class="retry-btn">Try again</a>
  </div>
</div>

<script>
// ── SUPABASE INIT ────────────────────────────────────────────────────────────
const SUPABASE_URL  = window.__SUPABASE_URL__  || 'REPLACE_WITH_SUPABASE_URL';
const SUPABASE_ANON = window.__SUPABASE_ANON__ || 'REPLACE_WITH_SUPABASE_ANON_KEY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── POST-LOGIN DESTINATION ───────────────────────────────────────────────────
// Explicit and deterministic. All successful logins land here.
// New users: /app (onboarding prompt shown via debug panel flag)
// Returning users: /app
// If you later want different destinations, change this one constant.
const POST_LOGIN_DESTINATION = '/app';

// ── MAIN CALLBACK HANDLER ────────────────────────────────────────────────────
(async () => {
  try {
    // Supabase JS v2 automatically picks up the OAuth tokens from the URL
    // hash/query params when getSession() is called after an OAuth redirect.
    // This is the standard Supabase PKCE flow.
    const { data: { session }, error: sessionError } = await sb.auth.getSession();

    if (sessionError) throw sessionError;
    if (!session)     throw new Error('No session established after OAuth callback. The login may have been cancelled or timed out.');

    const user = session.user;

    // ── UPSERT USER PROFILE ──────────────────────────────────────────────────
    // On first login: creates the profile row.
    // On subsequent logins: updates last_sign_in_at only (upsert is idempotent).
    // We use ignoreDuplicates:false so updated_at refreshes on every login.
    const provider = user.app_metadata?.provider || 'unknown';
    const email    = user.email || user.user_metadata?.email || null;
    const name     = user.user_metadata?.full_name
                  || user.user_metadata?.name
                  || user.user_metadata?.preferred_username
                  || null;
    const avatar   = user.user_metadata?.avatar_url || null;

    const { error: upsertError } = await sb
      .from('profiles')
      .upsert(
        {
          id:             user.id,       // matches auth.users.id (UUID)
          email:          email,
          full_name:      name,
          avatar_url:     avatar,
          auth_provider:  provider,
          // plan defaults are set in the DB schema (see supabase-schema.sql)
          // so we only set them here if not already set
          updated_at:     new Date().toISOString(),
        },
        {
          onConflict:     'id',          // if row exists, update non-plan fields
          ignoreDuplicates: false        // always update updated_at
        }
      );

    if (upsertError) {
      // Non-fatal: log it but don't block the user from accessing the app.
      // The session is valid even if the profile write fails.
      console.error('Profile upsert failed (non-fatal):', upsertError.message);
    }

    // ── SHOW SUCCESS + REDIRECT ──────────────────────────────────────────────
    setState('success');

    const debugNote = document.getElementById('debug-note');
    if (debugNote) {
      debugNote.textContent = `Signed in via ${provider} · redirecting…`;
    }

    // Short delay so the user sees the success state before redirect
    setTimeout(() => {
      window.location.replace(POST_LOGIN_DESTINATION);
    }, 900);

  } catch (err) {
    console.error('SSO callback error:', err);
    setState('error');
    document.getElementById('error-msg').textContent =
      err.message || 'Something went wrong. Please try again.';
  }
})();

function setState(s) {
  document.getElementById('state-loading').style.display = s === 'loading' ? 'block' : 'none';
  document.getElementById('state-success').style.display  = s === 'success' ? 'block' : 'none';
  document.getElementById('state-error').style.display    = s === 'error'   ? 'block' : 'none';
}
</script>
</body>
</html>
