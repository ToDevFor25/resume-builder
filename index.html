<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const S={
  resumeText:'',
  resumeFile:'',
  jobDesc:'',
  parsedResume:null,
  jobAnalysis:null,
  rewritePlan:null,
  result:null,
  saved:JSON.parse(localStorage.getItem('ro_saved')||'[]')
};

async function callClaude(prompt, maxTok = 2000, temp = 0) {
  const r = await fetch('/api/optimize', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jobDescription: S.jobDesc,
      resumeText: S.resumeText,
      prompt,
      max_tokens: maxTok,
      temperature: temp
    })
  });

  const raw = await r.text();

  let data;
  try {
    data = raw ? JSON.parse(raw) : {};
  } catch {
    data = { error: raw || `Server error ${r.status}` };
  }

  if (!r.ok) {
    const message =
      data?.error?.message ||
      data?.error ||
      data?.details?.error?.message ||
      raw ||
      `Server error ${r.status}`;

    throw new Error(message);
  }

  return data?.result || '';
}

function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  if(n==='saved') renderSaved();
}

function showRTab(t,el){
  ['tailored','ats','diff','gaps'].forEach(x=>{
    document.getElementById('rt-'+x).style.display = x===t ? 'block' : 'none';
  });
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove('show'),3500);
}

function onDrop(e){
  e.preventDefault();
  e.stopPropagation();
  onDragLeave();
  const f = e.dataTransfer?.files?.[0];
  if (f) processFile(f);
}

function onDragOver(e){
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('uz').classList.add('drag');
}

function onDragLeave(){
  document.getElementById('uz').classList.remove('drag');
}

function onFile(e){
  const f = e.target?.files?.[0];
  if (f) processFile(f);
}

async function processFile(f){
  try {
    S.resumeFile = f.name;
    document.getElementById('fname').textContent = f.name;
    document.getElementById('file-ok').style.display = 'flex';

    const ext = f.name.split('.').pop().toLowerCase();

    if(ext==='txt' || ext==='rtf'){
      S.resumeText = await f.text();
    } else if(ext==='docx'){
      try{
        const ab = await f.arrayBuffer();
        const r = await mammoth.extractRawText({ arrayBuffer: ab });
        S.resumeText = r.value || '';
      } catch(err){
        console.error(err);
        S.resumeText = '[Could not parse DOCX — try saving as TXT first]';
      }
    } else if(ext==='pdf'){
      try{
        const ab = await f.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
        let t = '';
        for(let i=1;i<=pdf.numPages;i++){
          const pg = await pdf.getPage(i);
          const c = await pg.getTextContent();
          t += c.items.map(x=>x.str).join(' ') + '\n';
        }
        S.resumeText = t;
      } catch(err){
        console.error(err);
        S.resumeText = '[Could not parse PDF]';
      }
    } else {
      S.resumeText = '';
      toast('Unsupported file type.');
      return;
    }

    setPipe(1,'done');
    toast('Resume loaded.');
  } catch (err) {
    console.error(err);
    toast('Could not load file.');
  }
}

function setPipe(n,s){
  document.getElementById('ps'+n).className='pipe-step'+(s==='done'?' done':s==='active'?' active':'');
}

function resetPipe(){
  for(let i=1;i<=6;i++) document.getElementById('ps'+i).className='pipe-step';
}

function showLoader(){
  document.getElementById('loader').classList.add('show');
}

function hideLoader(){
  document.getElementById('loader').classList.remove('show');
}

function setTitle(t){
  document.getElementById('loader-title').textContent=t;
}

async function tick(n,d=2000){
  await wait(d);
  document.getElementById('ls'+n).classList.add('on');
}

function wait(ms){
  return new Promise(r=>setTimeout(r,ms));
}

function resetLoader(){
  for(let i=1;i<=6;i++) document.getElementById('ls'+i).classList.remove('on');
}

function parseResume(text){
  const lines=text.split('\n').filter(l=>l.trim());
  const roles=[];
  let cur=null;
  let bid=0;
  let rid=0;
  const summary=[];
  const comps=[];
  const edu=[];
  const certs=[];
  let sec='header';
  const header={id:'hdr_001',text:lines.slice(0,3).join(' ')};

  for(const line of lines){
    const l=line.trim();
    if(!l) continue;

    if(/^(SUMMARY|PROFESSIONAL SUMMARY|PROFILE|OBJECTIVE)/i.test(l)){sec='summary';continue;}
    if(/^(CORE COMPETENCIES|COMPETENCIES|SKILLS|KEY SKILLS)/i.test(l)){sec='comps';continue;}
    if(/^(EXPERIENCE|PROFESSIONAL EXPERIENCE|WORK HISTORY)/i.test(l)){sec='exp';continue;}
    if(/^(EDUCATION|ACADEMIC)/i.test(l)){sec='edu';continue;}
    if(/^(CERTIFICATIONS?|LICENSES?|CREDENTIALS?)/i.test(l)){sec='certs';continue;}

    if(sec==='summary'){
      summary.push(l);
    } else if(sec==='comps'){
      comps.push({id:`cmp_${String(comps.length+1).padStart(3,'0')}`,text:l});
    } else if(sec==='edu'){
      edu.push({id:`edu_${String(edu.length+1).padStart(3,'0')}`,text:l});
    } else if(sec==='certs'){
      certs.push({id:`cert_${String(certs.length+1).padStart(3,'0')}`,text:l});
    } else if(sec==='exp'){
      if(l.startsWith('•')||l.startsWith('-')||l.startsWith('–')){
        if(cur){
          bid++;
          cur.bullets.push({
            id:`rol_${String(rid).padStart(3,'0')}_blt_${String(bid).padStart(3,'0')}`,
            text:l.replace(/^[•\-–]\s*/,'')
          });
        }
      } else if(l.match(/\d{4}/) && cur){
        if(!cur.dates) cur.dates=l;
      } else if(l.length<100){
        if(cur && cur.bullets.length>0 && !roles.find(r=>r.id===cur.id)) roles.push(cur);
        rid++;
        bid=0;
        cur={id:`rol_${String(rid).padStart(3,'0')}`,title:l,company:'',dates:'',bullets:[]};
      }
    }
  }

  if(cur && cur.bullets.length>0 && !roles.find(r=>r.id===cur.id)) roles.push(cur);

  return {
    header,
    summary:{id:'sum_001',text:summary.join(' ')},
    competencies:comps,
    roles:roles.slice(0,5),
    education:edu,
    certifications:certs
  };
}

async function generate(){
  const jd=document.getElementById('jd').value.trim();

  if(!S.resumeText){
    toast('Upload your resume first.');
    return;
  }

  if(!jd){
    toast('Paste the job description.');
    return;
  }

  S.jobDesc=jd;
  resetPipe();
  resetLoader();
  showLoader();

  try{
    setTitle('Analyzing resume structure');
    tick(1,300);
    S.parsedResume=parseResume(S.resumeText);
    setPipe(1,'done');
    setPipe(2,'active');

    setTitle('Analyzing job requirements');
    tick(2,600);
    const jaRaw=await callClaude(
      `Analyze this job description. Return JSON only:
{"job_title":"string","seniority_level":"Director|VP|SVP","top_themes":["3-5 themes"],"required_keywords":["must-have keywords"],"must_have_signals":["P&L","multi-site","HEDIS etc"],"likely_gaps_for_director_to_vp":["gaps list"],"tone_of_role":"operational|strategic|clinical"}
JOB:
${jd.substring(0,2000)}`,
      600,0
    );

    try{
      S.jobAnalysis=JSON.parse(jaRaw);
    } catch {
      S.jobAnalysis={
        job_title:'Target Role',
        seniority_level:'VP',
        top_themes:[],
        required_keywords:[],
        must_have_signals:[],
        likely_gaps_for_director_to_vp:[],
        tone_of_role:'operational'
      };
    }

    renderJA(S.jobAnalysis);
    setPipe(2,'done');
    setPipe(3,'active');

    setTitle('Building rewrite plan');
    tick(3,600);
    const planRaw=await callClaude(
      `Create a rewrite plan. Never suggest inventing facts.
RESUME: ${JSON.stringify(S.parsedResume).substring(0,1800)}
JOB: ${JSON.stringify(S.jobAnalysis).substring(0,600)}
Settings: intensity=${document.getElementById('opt-i').value}, positioning=${document.getElementById('opt-p').value}
Return JSON: {"summary_action":"rewrite|preserve","summary_strategy":"string","bullets_to_rewrite":[{"bullet_id":"string","rewrite_strategy":"string","keywords_to_inject":["string"]}],"bullets_to_preserve":["ids"],"keywords_to_inject_globally":["string"],"gaps":[{"signal":"string","severity":"high|medium|low","mitigation":"string"}],"executive_positioning_notes":"string"}`,
      1000,0
    );

    try{
      S.rewritePlan=JSON.parse(planRaw);
    } catch {
      S.rewritePlan={
        summary_action:'rewrite',
        summary_strategy:'Elevate to VP positioning',
        bullets_to_rewrite:[],
        bullets_to_preserve:[],
        keywords_to_inject_globally:[],
        gaps:[],
        executive_positioning_notes:'Elevate language throughout'
      };
    }

    setPipe(3,'done');
    setPipe(4,'active');

    setTitle('Rewriting for executive positioning');
    tick(4,500);
    const genRaw=await callClaude(
      `Execute this rewrite plan. NEVER invent facts, companies, titles, dates, degrees, or metrics not in the original.
Executive verb upgrades: "Managed"→"Directed", "Responsible for"→"Accountable for", "Helped"→"Drove", "Supported"→"Architected", "Worked with"→"Aligned", "Participated"→"Shaped and executed"
ORIGINAL: ${JSON.stringify(S.parsedResume).substring(0,2000)}
JOB: ${JSON.stringify(S.jobAnalysis).substring(0,500)}
PLAN: ${JSON.stringify(S.rewritePlan).substring(0,500)}
Return JSON: {"preserve_output":{"summary":"string","competencies":["list"],"roles":[{"role_id":"string","bullets":[{"bullet_id":"string","text":"string","changed":true,"change_reason":"string"}]}]},"ats_output":{"summary":"string","competencies":["list"],"roles":[{"role_id":"string","company":"MUST match original","title":"MUST match original","dates":"MUST match original","bullets":["plain text"]}]},"fit_analysis":{"match_score":0,"score_rationale":"string","key_strengths":["string"],"gaps":[{"signal":"string","severity":"high|medium|low","recommendation":"string"}],"missing_keywords":["string"],"executive_readiness":"string"},"change_log":[{"element_id":"string","section":"string","before":"string","after":"string","reason":"string"}],"needs_confirmation":[{"element_id":"string","issue":"string","question_for_user":"string"}]}`,
      4000,0.3
    );

    let result;
    try{
      result=JSON.parse(genRaw);
    } catch {
      result={
        preserve_output:{
          summary:S.parsedResume.summary.text,
          competencies:S.parsedResume.competencies.map(c=>c.text),
          roles:S.parsedResume.roles.map(r=>({
            role_id:r.id,
            bullets:r.bullets.map(b=>({
              bullet_id:b.id,
              text:b.text,
              changed:false,
              change_reason:''
            }))
          }))
        },
        ats_output:{summary:'',competencies:[],roles:[]},
        fit_analysis:{
          match_score:70,
          score_rationale:'Analysis complete.',
          key_strengths:[],
          gaps:[],
          missing_keywords:[],
          executive_readiness:'Review complete.'
        },
        change_log:[],
        needs_confirmation:[]
      };
    }

    setPipe(4,'done');
    setPipe(5,'active');

    setTitle('Validating — checking for hallucinations');
    tick(5,500);
    const violations=validate(result,S.parsedResume);
    violations.forEach(v=>{
      if(v.severity==='blocker'){
        revert(result,v.element_id,S.parsedResume);
      } else {
        if(!result.needs_confirmation) result.needs_confirmation=[];
        result.needs_confirmation.push({
          element_id:v.element_id,
          issue:v.issue,
          question_for_user:'Please verify: '+v.issue
        });
      }
    });

    setPipe(5,'done');
    setPipe(6,'active');
    tick(6,300);

    S.result=result;
    hideLoader();
    renderResults(result);
    showPage('results');

  } catch(e){
    console.error(e);
    hideLoader();
    toast('Error: '+e.message);
  }
}

function validate(result,original){
  const violations=[];

  if(result.ats_output && result.ats_output.roles){
    result.ats_output.roles.forEach(role=>{
      const orig=original.roles.find(r=>r.id===role.role_id);
      if(!orig) return;

      if(role.company && orig.company && orig.company.length>2 && role.company.toLowerCase()!==orig.company.toLowerCase()){
        violations.push({
          element_id:role.role_id,
          type:'company_changed',
          severity:'blocker',
          issue:`Company changed: "${orig.company}" → "${role.company}"`
        });
      }

      if(role.title && orig.title && orig.title.length>2 && role.title.toLowerCase()!==orig.title.toLowerCase()){
        violations.push({
          element_id:role.role_id,
          type:'title_changed',
          severity:'blocker',
          issue:`Title changed: "${orig.title}" → "${role.title}"`
        });
      }
    });
  }

  return violations;
}

function revert(result,id,original){
  if(result.ats_output && result.ats_output.roles){
    result.ats_output.roles.forEach(r=>{
      if(r.role_id===id){
        const o=original.roles.find(x=>x.id===id);
        if(o){
          r.company=o.company;
          r.title=o.title;
          r.dates=o.dates;
        }
      }
    });
  }
}

function renderJA(ja){
  const el=document.getElementById('ja-display');
  el.style.display='block';
  el.innerHTML=`<div class="ja-preview"><h4>${ja.job_title||'Role'} <span style="font-size:.7rem;opacity:.5;font-family:'Outfit',sans-serif;font-weight:400;">${ja.seniority_level||''}</span></h4><div class="ja-label">Top Themes</div>${(ja.top_themes||[]).map(t=>`<span class="ja-tag">${t}</span>`).join('')}<div class="ja-label">Must-Have Signals</div>${(ja.must_have_signals||[]).map(s=>`<div class="ja-gap">→ ${s}</div>`).join('')||'<div class="ja-gap" style="opacity:.4">None identified</div>'}<div class="ja-label">Likely Gaps (Director→VP)</div>${(ja.likely_gaps_for_director_to_vp||[]).map(g=>`<div class="ja-gap" style="color:rgba(255,200,100,.75);">⚠ ${g}</div>`).join('')||'<div class="ja-gap" style="opacity:.4">None identified</div>'}</div>`;
}

function renderResults(r){
  const fa=r.fit_analysis||{};
  document.getElementById('sc-num').textContent=(fa.match_score||'—')+'%';

  document.getElementById('signals').innerHTML=
    (fa.key_strengths||[]).map(s=>`<div class="signal"><div class="sdot s-g"></div>${s}</div>`).join('')+
    (fa.gaps||[]).filter(g=>g.severity==='medium').map(g=>`<div class="signal"><div class="sdot s-y"></div>${g.signal}</div>`).join('')+
    (fa.gaps||[]).filter(g=>g.severity==='high').map(g=>`<div class="signal"><div class="sdot s-r"></div>${g.signal}</div>`).join('');

  const kw=fa.missing_keywords||[];
  document.getElementById('missing-kw').innerHTML=kw.length
    ? kw.map(k=>`<span class="kw-tag">${k}</span>`).join('')
    : `<span style="color:var(--sage);font-size:.78rem;">✅ No missing keywords</span>`;

  document.getElementById('rv-tailored').innerHTML=buildTailored(r.preserve_output,r.change_log);
  document.getElementById('rv-ats').innerHTML=buildAts(r.ats_output);

  const cl=r.change_log||[];
  document.getElementById('rv-diff').innerHTML=cl.length
    ? cl.map(d=>`<div class="diff-item"><div class="diff-head">📝 ${d.section}</div><div class="diff-before">${esc(d.before)}</div><div class="diff-after">${esc(d.after)}</div><div class="diff-why">💡 ${d.reason}</div></div>`).join('')
    : '<div class="notice">No changes logged.</div>';

  const gaps=fa.gaps||[];
  document.getElementById('rv-gaps').innerHTML=
    `<div style="margin-bottom:1rem;font-size:.82rem;font-style:italic;color:var(--steel);">${fa.executive_readiness||''}</div>` +
    (gaps.length
      ? gaps.map(g=>`<div style="border:1.5px solid var(--border);border-radius:6px;padding:.85rem 1rem;margin-bottom:.65rem;"><div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;"><div style="width:8px;height:8px;border-radius:50%;background:${g.severity==='high'?'#d46060':g.severity==='medium'?'var(--gold)':'#5caa5c'};flex-shrink:0;"></div><strong style="font-size:.82rem;">${g.signal}</strong><span style="font-size:.68rem;color:var(--mist);text-transform:uppercase;letter-spacing:.05em;margin-left:.25rem;">${g.severity}</span></div><p style="font-size:.78rem;color:var(--steel);line-height:1.55;">${g.recommendation}</p></div>`).join('')
      : '<div class="notice">No significant gaps identified.</div>');

  const flags=r.needs_confirmation||[];
  document.getElementById('flags-display').innerHTML=flags.length
    ? flags.map(f=>`<div class="flag-item"><h4>⚠ ${f.element_id}</h4><p>${f.question_for_user||f.issue}</p><div class="flag-btns"><button class="flag-btn approve" onclick="resolveFlag(this,'Confirmed')">✓ Confirm</button><button class="flag-btn reject" onclick="resolveFlag(this,'Removed')">✗ Remove</button></div></div>`).join('')
    : '<span style="font-size:.78rem;color:var(--sage);">✅ All content verified against your original resume.</span>';
}

function resolveFlag(btn,status){
  btn.closest('.flag-item').style.opacity='.4';
  btn.closest('.flag-btns').innerHTML=`<span style="font-size:.75rem;color:${status==='Confirmed'?'var(--sage)':'#d46060'};">${status==='Confirmed'?'✓ Confirmed':'✗ Removed'}</span>`;
  toast(status==='Confirmed'?'Content confirmed.':'Content removed from output.');
}

function buildTailored(po,cl){
  if(!po) return '<p style="color:#aaa;font-style:italic;">No output generated.</p>';

  const name=S.parsedResume?.header?.text?.split(' ').slice(0,3).join(' ')||'Your Name';
  let h=`<h1>${name}</h1>`;

  if(po.summary) h+=`<h2>Summary</h2><p style="line-height:1.75;">${po.summary}</p>`;
  if(po.competencies?.length) h+=`<h2>Core Competencies</h2><ul>${po.competencies.map(c=>`<li>${c}</li>`).join('')}</ul>`;

  if(po.roles?.length){
    h+=`<h2>Professional Experience</h2>`;
    po.roles.forEach(role=>{
      const orig=S.parsedResume?.roles?.find(r=>r.id===role.role_id);
      h+=`<div class="jt">${orig?.title||''}</div><div class="jm">${orig?.company||''}${orig?.dates?' · '+orig.dates:''}</div><ul>`;
      (role.bullets||[]).forEach(b=>{
        h+=`<li style="${b.changed?'background:#faf4e6;border-left:3px solid var(--gold);padding-left:.4rem;margin-left:-.4rem;':''}">${b.text}</li>`;
      });
      h+=`</ul>`;
    });
  }

  return h;
}

function buildAts(ao){
  if(!ao) return '<p style="color:#aaa;font-style:italic;">No ATS output generated.</p>';

  const name=S.parsedResume?.header?.text?.split(' ').slice(0,3).join(' ')||'Your Name';
  let h=`<h1>${name}</h1>`;

  if(ao.summary) h+=`<h2>PROFESSIONAL SUMMARY</h2><p>${ao.summary}</p>`;
  if(ao.competencies?.length) h+=`<h2>CORE COMPETENCIES</h2><p>${ao.competencies.join(' | ')}</p>`;

  if(ao.roles?.length){
    h+=`<h2>PROFESSIONAL EXPERIENCE</h2>`;
    ao.roles.forEach(r=>{
      h+=`<div class="jt">${r.title||''}</div><div class="jm">${r.company||''}${r.dates?' · '+r.dates:''}</div><ul>${(r.bullets||[]).map(b=>`<li>${b}</li>`).join('')}</ul>`;
    });
  }

  return h;
}

function dlResume(fmt){
  if(!S.result){
    toast('No result to download.');
    return;
  }

  const po=S.result.preserve_output;
  const ao=S.result.ats_output;
  const src=fmt==='ats'?ao:po;
  const name=(S.parsedResume?.header?.text?.split(' ').slice(0,2).join('-')||'Resume');
  let text=name.replace(/-/g,' ')+'\n\n';

  if(src?.summary) text+='PROFESSIONAL SUMMARY\n'+src.summary+'\n\n';
  if(src?.competencies?.length) text+='CORE COMPETENCIES\n'+src.competencies.join(' | ')+'\n\n';

  text+='PROFESSIONAL EXPERIENCE\n';
  (src?.roles||[]).forEach(r=>{
    const orig=S.parsedResume?.roles?.find(x=>x.id===r.role_id);
    text+=(r.title||orig?.title||'')+'\n'+(r.company||orig?.company||'')+(r.dates||orig?.dates?' | '+(r.dates||orig?.dates):'')+'\n';
    (r.bullets||[]).forEach(b=>{
      text+='• '+(typeof b==='string'?b:b.text)+'\n';
    });
    text+='\n';
  });

  if(fmt==='txt'||fmt==='ats'){
    dl(new Blob([text],{type:'text/plain'}),`${name}-${fmt==='ats'?'ATS':'optimized'}.txt`);
  } else {
    const rtf=`{\\rtf1\\ansi\\deff0{\\fonttbl{\\f0\\froman Georgia;}}\\widowctrl\\f0\\fs22 ${text.replace(/\\/g,'\\\\').replace(/\{/g,'\\{').replace(/\}/g,'\\}').replace(/\n/g,'\\par ')}}`;
    dl(new Blob([rtf],{type:'application/rtf'}),`${name}-optimized.rtf`);
  }
}

function dl(blob,name){
  const u=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=u;
  a.download=name;
  a.click();
  URL.revokeObjectURL(u);
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveResume(){
  if(!S.result){
    toast('Nothing to save.');
    return;
  }

  S.saved.unshift({
    id:Date.now(),
    name:S.resumeFile||'Resume',
    job:(S.jobDesc||'').substring(0,55)+'…',
    date:new Date().toLocaleDateString(),
    score:S.result.fit_analysis?.match_score||0,
    result:S.result,
    parsedResume:S.parsedResume
  });

  try{
    localStorage.setItem('ro_saved',JSON.stringify(S.saved.slice(0,20)));
  }catch{}

  toast('Saved to dashboard.');
}

function renderSaved(){
  const el=document.getElementById('saved-list');
  if(!S.saved.length){
    el.innerHTML='<div class="empty"><div class="big">📂</div><h3>No saved resumes yet</h3><p>Generate an optimized resume to get started.</p></div>';
    return;
  }

  el.innerHTML=S.saved.map(s=>`<div class="saved-item"><div><h4>${s.name}</h4><p>${s.job} · ${s.date} · Match: ${s.score}%</p></div><div class="saved-acts"><button class="tiny" onclick="loadSaved(${s.id})">View</button><button class="tiny" onclick="delSaved(${s.id})">🗑</button></div></div>`).join('');
}

function loadSaved(id){
  const s=S.saved.find(x=>x.id===id);
  if(!s) return;
  S.result=s.result;
  S.parsedResume=s.parsedResume;
  renderResults(s.result);
  showPage('results');
}

function delSaved(id){
  S.saved=S.saved.filter(x=>x.id!==id);
  try{
    localStorage.setItem('ro_saved',JSON.stringify(S.saved));
  }catch{}
  renderSaved();
}

document.addEventListener('DOMContentLoaded', () => {
  const uploadZone = document.getElementById('uz');
  const resumeInput = document.getElementById('rf');

  if (uploadZone && resumeInput) {
    uploadZone.addEventListener('click', () => {
      resumeInput.click();
    });

    uploadZone.addEventListener('dragenter', (e) => {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.add('drag');
    });

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
      uploadZone.classList.add('drag');
    });

    uploadZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('drag');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      uploadZone.classList.remove('drag');
      const files = e.dataTransfer?.files;
      if (files && files.length > 0) {
        processFile(files[0]);
      }
    });
  }
});
</script>
